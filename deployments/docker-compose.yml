services:
  db:
    image: postgres:15-alpine
    container_name: "microblog-db"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwerty
      POSTGRES_DB: microblog
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d microblog"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: microblog-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db 
    networks: 
      - backend
  
  kafka:
    image: redpandadata/redpanda:v24.3.7
    container_name: microblog-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  api: 
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: microblog-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "8081:8080"
    networks:
      - backend
  
  engagement:
    build:
      context: ..
      dockerfile: Dockerfile.engagement
    container_name: microblog-engagement
    restart: always
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - ../.env
    ports:
      - "8082:8082"
    networks:
      - backend

volumes: 
  postgres_data:

networks:
  backend: